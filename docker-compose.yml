services:
  ros2:
    build:
      context: .
      dockerfile: Dockerfile.ros2
    image: isaacsim-store-shelf:ros2
    network_mode: host
    ipc: host
    environment:
      FASTDDS_BUILTIN_TRANSPORTS: UDPv4
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION:-rmw_fastrtps_cpp}
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
      ROS_LOCALHOST_ONLY: ${ROS_LOCALHOST_ONLY:-0}
    working_dir: /workspace
    stdin_open: true
    tty: true
    volumes:
      - ./:/workspace

  isaacsim:
    build:
      context: .
      dockerfile: Dockerfile.isaacsim
    image: isaacsim-store-shelf:isaacsim
    network_mode: host
    ipc: host
    gpus: all
    environment:
      ACCEPT_EULA: "Y"
      FASTDDS_BUILTIN_TRANSPORTS: UDPv4
      PRIVACY_CONSENT: "Y"
      ISAACSIM_ROOT: /isaac-sim
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
      ROS_LOCALHOST_ONLY: ${ROS_LOCALHOST_ONLY:-0}
      NVIDIA_DRIVER_CAPABILITIES: all
      NVIDIA_VISIBLE_DEVICES: all
      __NV_PRIME_RENDER_OFFLOAD: "1"
      __VK_LAYER_NV_optimus: NVIDIA_only
      __GLX_VENDOR_LIBRARY_NAME: nvidia
      DISPLAY: ${DISPLAY:-:0}
      XAUTHORITY: /isaac-sim/.Xauthority
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONPYCACHEPREFIX: /tmp/isaacsim_pycache
      PYTHONUNBUFFERED: "1"
    stdin_open: true
    tty: true
    user: "1234:1234"
    entrypoint:
      - /bin/bash
      - -lc
    command:
      - |
        export ROS_DISTRO=jazzy
        export RMW_IMPLEMENTATION="$${RMW_IMPLEMENTATION:-rmw_fastrtps_cpp}"
        export COLCON_PYTHON_EXECUTABLE=/isaac-sim/kit/python/bin/python3
        export PYTHONPATH="/workspace/src/isaacsim_manager:/isaac-sim/exts/isaacsim.ros2.bridge/jazzy/rclpy:$${PYTHONPATH:-}"
        export LD_LIBRARY_PATH="/isaac-sim/exts/isaacsim.ros2.bridge/jazzy/lib:$${LD_LIBRARY_PATH:-}"
        echo "Starting Isaac Sim manager from /workspace/src/isaacsim_manager"
        exec /isaac-sim/python.sh -m isaacsim_manager.manager
    volumes:
      - ./:/workspace:ro
      - ${HOME}/.Xauthority:/isaac-sim/.Xauthority:ro
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ./.docker/isaacsim/cache/main:/isaac-sim/.cache
      - ./.docker/isaacsim/cache/computecache:/isaac-sim/.nv/ComputeCache
      - ./.docker/isaacsim/logs:/isaac-sim/.nvidia-omniverse/logs
      - ./.docker/isaacsim/config:/isaac-sim/.nvidia-omniverse/config
      - ./.docker/isaacsim/data:/isaac-sim/.local/share/ov/data
      - ./.docker/isaacsim/pkg:/isaac-sim/.local/share/ov/pkg
