controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    right_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

right_arm_controller:
  ros__parameters:
    joints:
      - yumi_joint_1_r
      - yumi_joint_2_r
      - yumi_joint_7_r
      - yumi_joint_3_r
      - yumi_joint_4_r
      - yumi_joint_5_r
      - yumi_joint_6_r

    command_interfaces:
      - position

    state_interfaces:
      - position
      - velocity

    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    open_loop_control: false

    constraints:
      goal_time: 8.0
      stopped_velocity_tolerance: 0.05
      yumi_joint_1_r:
        trajectory: 0.5
        goal: 0.2
      yumi_joint_2_r:
        trajectory: 0.5
        goal: 0.2
      yumi_joint_7_r:
        trajectory: 0.5
        goal: 0.2
      yumi_joint_3_r:
        trajectory: 0.5
        goal: 0.2
      yumi_joint_4_r:
        trajectory: 0.5
        goal: 0.2
      yumi_joint_5_r:
        trajectory: 0.5
        goal: 0.2
      yumi_joint_6_r:
        trajectory: 0.5
        goal: 0.2
